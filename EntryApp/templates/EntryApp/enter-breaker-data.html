{% extends "base.html" %}

{% block header %}
        Enter breaker data here for {{ breaker_img_path }}
{% endblock header %}
{% block content %}
        <form action={% url 'EntryApp:submit_breaker' %} method="post">
            {% csrf_token %}
            {{ form }}
            <input type="submit" value="Submit">
        </form>
        <br>
        <div id="openseadragon1" style="width: 800px; height: 600px;"></div>
        <script src="https://cdn.jsdelivr.net/npm/openseadragon@2.4/build/openseadragon/openseadragon.min.js"></script>
       <script type="text/javascript">
            var Viewer = OpenSeadragon({
                id: "openseadragon1",
                prefixUrl: "/static/deepzoom/js/vendor/openseadragon/images/",
                tileSources: {
                    type: 'image',
                    url: "/images/{{ breaker_img_path }}"
                },
                buildPyramid: false
            });
        </script>
{% endblock content %}
